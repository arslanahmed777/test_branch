name: Create Tag and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get version and tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists. Skipping tag and release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract latest changelog notes
        if: steps.tag_check.outputs.exists == 'false'
        id: notes
        run: |
          awk '
          /^# 🚀 v/ {
            if (seen) exit
            seen=1
          }
          seen { print }
          ' CHANGELOG.md > latest-release-notes.md

          if [ ! -s latest-release-notes.md ]; then
            echo "Version ${{ steps.version.outputs.version }} - auto-generated release notes." > latest-release-notes.md
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG=${{ steps.version.outputs.tag }}
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const tagName = '${{ steps.version.outputs.tag }}';
            const releaseBody = fs.readFileSync('latest-release-notes.md', 'utf8');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Release ${tagName}`,
              body: releaseBody,
              draft: false,
              prerelease: false
            });
